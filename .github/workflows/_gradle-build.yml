name: Gradle build

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string

jobs:
  build:
    name: Build & test ${{ inputs.service }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build
        working-directory: ${{ inputs.service }}
        run: ./gradlew build -x test

      - name: Unit tests
        working-directory: ${{ inputs.service }}
        run: ./gradlew test --tests "**.*UTest"
