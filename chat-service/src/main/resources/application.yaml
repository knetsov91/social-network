spring:
  application:
    name: chat-service
  data:
    mongodb:
      host: ${MONGODB_HOST}
      database: chats
      port: 27017
      username: ${MONGO_USERNAME}
      password: ${MONGO_PASSWORD}
      authentication-database: ${MONGO_AUTH}

server:
  port: 8089

logging:
  level:
    org:
      springframework:
        security: DEBUG

frontendUrl: http://localhost:5174/

management:
  server:
    port: 8090
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always