spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/posts_test
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create-drop

  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    vault:
      enabled: false

eureka:
  client:
    enabled: false
